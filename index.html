<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>happy birthday 🎂💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --note-yellow: #fff9c4;
            --bg-color: #ffe5ec;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffc2d1 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            font-family: 'Itim', cursive;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
        }

        .page {
            display: none;
            width: 100%;
            animation: fadeIn 0.8s ease forwards;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- หน้าแรก: กล่องและน้องแมว --- */
        .intro-box {
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            position: relative;
        }

        /* น้องแมวถือดอกไม้ */
        .cat-mascot {
            width: 140px;
            margin-bottom: -15px;
            position: relative;
            z-index: 2;
            animation: bounceMascot 1.5s infinite alternate;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        @keyframes bounceMascot {
            0% { transform: translateY(0) rotate(-2deg); }
            100% { transform: translateY(-15px) rotate(2deg); }
        }

        /* --- หน้าสอง: กระดาษโน้ตและรูป --- */
        .sticky-note {
            background: var(--note-yellow);
            padding: 40px 20px 30px 20px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            position: relative;
            transform: rotate(-1deg);
            border-bottom-right-radius: 60px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* เทปใสแปะกระดาษ */
        .sticky-note::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 35px;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 5;
        }

        /* กรอบรูปโพลารอยด์ */
        .polaroid {
            background: white;
            padding: 10px 10px 20px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 70%;
            transform: rotate(3deg);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        
        .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
        }

        .polaroid img {
            width: 100%;
            height: auto;
            border-radius: 3px;
        }

        .beads-img {
            width: 120px;
            margin-top: 15px;
            transform: rotate(-2deg);
            border-radius: 10px;
        }

        /* --- ตัวอักษรและปุ่ม --- */
        h1 { color: var(--primary-pink); font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #5d4037; font-size: 1.2rem; line-height: 1.5; white-space: pre-line; margin-bottom: 10px; }

        .btn-group {
            position: relative;
            width: 100%;
            height: 60px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-family: 'Itim', cursive;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5;
        }

        .btn-yes {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        .btn-yes:hover { transform: scale(1.1); }

        .btn-no {
            background: #e0e0e0;
            color: #777;
            position: absolute;
            z-index: 6;
            left: 60%;
        }

        /* --- เอฟเฟกต์หัวใจลอย --- */
        .heart {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1.1rem; }
            .intro-box { padding: 30px 20px; }
            .sticky-note { padding: 30px 15px; }
            .cat-mascot { width: 120px; }
            .btn { font-size: 1.1rem; padding: 10px 20px; }
            .polaroid { width: 85%; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        
        <div id="page1" class="page active">
            <img src="IMG_20260615_182442_626.jpg" class="cat-mascot" alt="Cute Cat">
            
            <div class="intro-box">
                <h1>happy birthday na borfore</h1>
                <p>มีต้าวแมวเอาดอกไม้มาส่งให้บอฟอ 🌷
                มีความสุขมากๆๆน้าาา</p>
                
                <div class="btn-group">
                    <button class="btn btn-yes" onclick="openNote()">เปิดเลยยย</button>
                    <button class="btn btn-no" id="noBtn" onmouseover="runAway(event)" ontouchstart="runAway(event)" onclick="runAway(event)">ไม่เอาต้องเปิดด</button>
                </div>
            </div>
        </div>

        <div id="page2" class="page">
            <div class="sticky-note">
                
                <div class="polaroid">
                    <img src="IMG_20260615_182354_882.jpg" alt="My Photo">
                </div>

                <h1>For... U 🥰</h1>
                <p>🎂 สุขสันต์วันเกิดนะบอฟอ 🎂
                ขอให้ปีนี้เป็นปีที่ใจดีกับเธอมากๆๆๆๆๆ
                ยิ้มเยอะๆๆ เค้าดีใจมากกที่ได้มาเจอเธอ
                
                จะคอยซัพพอร์ตเสมอนะะ เธอเก่งมากกฮึบๆๆๆ
                💖</p>
                
                <img src="IMG_20260615_182316_919.jpg" class="beads-img" alt="Miss U">

            </div>
        </div>

    </div>

    <script>
        // ฟังก์ชันวิ่งหนีของปุ่ม
        function runAway(e) {
            if (e) e.preventDefault(); 
            const btn = document.getElementById('noBtn');
            btn.style.position = 'fixed';
            btn.style.transition = 'left 0.2s ease, top 0.2s ease'; 
            
            const maxX = window.innerWidth - btn.offsetWidth - 20;
            const maxY = window.innerHeight - btn.offsetHeight - 20;
            
            const x = Math.max(10, Math.random() * maxX);
            const y = Math.max(10, Math.random() * maxY);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // ฟังก์ชันเปิดหน้า 2
        function openNote() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            
            // เรียกใช้เอฟเฟกต์พลุกระดาษและหัวใจลอย
            burstConfetti();
            setInterval(createHeart, 300);
        }

        // เอฟเฟกต์สร้างหัวใจลอยขึ้นมาเรื่อยๆ
        function createHeart() {
            const elements = ['❤️', '💖', '✨', '🌸', '☁️'];
            const h = document.createElement('div');
            h.classList.add('heart');
            h.innerText = elements[Math.floor(Math.random() * elements.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 20) + 'px';
            h.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        // เอฟเฟกต์พลุกระดาษตอนกดปุ่ม (Confetti Burst)
        function burstConfetti() {
            const colors = ['#ff4d6d', '#ffc2d1', '#fff9c4', '#81d4fa', '#ce93d8'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.classList.add('heart'); // ใช้คลาสเดียวกับหัวใจเพื่อให้มันลอย
                
                // สุ่มรูปร่างพลุกระดาษ (สี่เหลี่ยม หรือ วงกลม)
                conf.style.width = (Math.random() * 10 + 5) + 'px';
                conf.style.height = (Math.random() * 10 + 5) + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                
                // กำหนดตำแหน่งเริ่มตรงกลางจอ
                conf.style.left = '50vw';
                conf.style.bottom = '50vh';
                
                // สุ่มทิศทางให้ระเบิดกระจายออก
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 200; // ให้ลอยขึ้นด้วย
                
                conf.style.animation = `burst 1.5s ease-out forwards`;
                conf.style.setProperty('--tx', tx + 'px');
                conf.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 1500);
            }
        }
    </script>

    <style>
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); opacity: 0; }
        }
    </style>
</body>
</html>
